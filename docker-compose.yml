x-backend-environment: &backend-environment
  CONFIG_SOURCE: aws
  CONFIG_SSM_PATH: ${CONFIG_SSM_PATH:-/poc/app}
  CONFIG_SECRET_IDS: ${CONFIG_SECRET_IDS:-/poc/app/runtime}
  CONFIG_AWS_ENDPOINT: ${LOCALSTACK_ENDPOINT_INTERNAL:-http://localstack:4566}
  CONFIG_AWS_REGION: ${POC_AWS_DEFAULT_REGION:-eu-north-1}
  CONFIG_AWS_ACCESS_KEY_ID: ${LOCALSTACK_AWS_ACCESS_KEY_ID:-test}
  CONFIG_AWS_SECRET_ACCESS_KEY: ${LOCALSTACK_AWS_SECRET_ACCESS_KEY:-test}
  CONFIG_AWS_SESSION_TOKEN: ${LOCALSTACK_AWS_SESSION_TOKEN:-}
  OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-alittlebyte}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-poc-document-pipeline}
  OTEL_DEPLOYMENT_ENVIRONMENT: ${OTEL_DEPLOYMENT_ENVIRONMENT:-local}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
  POC_RELEASE_VERSION: ${POC_RELEASE_VERSION:-local}
  POC_METRICS_ENABLED: ${POC_METRICS_ENABLED:-true}

services:
  traefik:
    image: traefik:v3.4
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "${TRAEFIK_WEB_PORT:-8080}:8080"
      - "${TRAEFIK_WEBSECURE_PORT:-8443}:8443"
    volumes:
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./docker/traefik/certs:/etc/traefik/certs:ro
      - ./docker/traefik/usersfile:/etc/traefik/usersfile:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - edge
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command:
      - --config=/etc/otelcol-contrib/config.yml
    volumes:
      - ./docker/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      nginx:
        condition: service_healthy
      traefik:
        condition: service_started
    # backend: riceve OTLP da app/queue e scrappa nginx; observability: esporta
    # verso tempo/loki e scrappa traefik:9100
    networks:
      - backend
      - observability

  prometheus:
    image: prom/prometheus:v3.9.0
    # Nessuna porta esposta sull'host: la UI è servita da Traefik su
    # https://prometheus.localhost:8443 dietro basic auth. Niente
    # --web.enable-lifecycle: esponeva /-/reload e /-/quit senza auth.
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      otel-collector:
        condition: service_started
      alertmanager:
        condition: service_started
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.9.0
    # Nessuna porta esposta sull'host: UI/API via https://tempo.localhost:8443
    # (basic auth); Grafana e otel-collector vi accedono dalla rete interna.
    command:
      - -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - observability

  alertmanager:
    image: prom/alertmanager:v0.29.0
    # Nessuna porta esposta sull'host: UI via https://alertmanager.localhost:8443
    # (basic auth); Prometheus vi inoltra gli alert dalla rete interna.
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - observability

  grafana:
    image: grafana/grafana:12.3.0
    # Nessuna porta esposta sull'host: servita da Traefik su
    # https://grafana.localhost:8443 con la sua autenticazione nativa.
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.localhost:8443}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - observability

  loki:
    image: grafana/loki:3.3.2
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - observability

  alloy:
    image: grafana/alloy:v1.5.1
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_started
    networks:
      - observability

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    # edge: riceve da traefik; backend: inoltra a php-fpm (app)
    networks:
      - edge
      - backend

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        COMPOSER_INSTALL_DEV: ${COMPOSER_INSTALL_DEV:-true}
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "about", "--only=environment"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      # Shared with the queue worker so domain metrics recorded by the consumer
      # (Textract, SQS, workflow completion) reach the /internal/metrics exporter.
      - observability-metrics:/var/www/html/storage/app/private/observability
    networks:
      - backend

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        COMPOSER_INSTALL_DEV: ${COMPOSER_INSTALL_DEV:-true}
    command: php artisan poc:workflow:consume --max=0 --wait=10
    restart: unless-stopped
    environment:
      <<: *backend-environment
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
    volumes:
      - observability-metrics:/var/www/html/storage/app/private/observability
    networks:
      - backend

  migrate:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        COMPOSER_INSTALL_DEV: ${COMPOSER_INSTALL_DEV:-true}
    command: php artisan migrate --force --no-interaction
    profiles:
      - release
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
    networks:
      - backend

  terraform:
    image: hashicorp/terraform:1.10.5
    working_dir: /workspace/infra/localstack
    entrypoint: ["terraform"]
    profiles:
      - tools
    environment:
      AWS_ACCESS_KEY_ID: ${LOCALSTACK_AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${LOCALSTACK_AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${POC_AWS_DEFAULT_REGION:-eu-north-1}
      TF_PLUGIN_CACHE_DIR: /terraform/plugin-cache
      TF_VAR_aws_region: ${POC_AWS_DEFAULT_REGION:-eu-north-1}
      TF_VAR_localstack_endpoint: ${LOCALSTACK_ENDPOINT_INTERNAL:-http://localstack:4566}
      TF_VAR_ssm_parameter_path: ${CONFIG_SSM_PATH:-/poc/app}
      TF_VAR_runtime_secret_name: ${CONFIG_SECRET_IDS:-/poc/app/runtime}
      TF_VAR_app_url: ${POC_APP_URL:-https://localhost:8443}
      TF_VAR_db_database: ${POC_DB_DATABASE:-poc}
      TF_VAR_db_username: ${POC_DB_USERNAME:-poc}
      TF_VAR_db_password: ${POC_DB_PASSWORD:-poc-local-password}
      TF_VAR_redis_password: ${POC_REDIS_PASSWORD:-poc-redis-local-password}
      TF_VAR_bedrock_model_id: ${POC_BEDROCK_MODEL_ID:-amazon.nova-lite-v1:0}
      TF_VAR_bedrock_region: ${BEDROCK_REGION:-eu-north-1}
      TF_VAR_bedrock_endpoint: ${BEDROCK_ENDPOINT:-not-configured}
      TF_VAR_confidence_threshold: ${POC_CONFIDENCE_THRESHOLD:-80}
      TF_VAR_document_disk: ${POC_DOCUMENT_DISK:-s3}
      TF_VAR_real_aws_region: ${AWS_REAL_REGION:-eu-central-1}
      TF_VAR_real_aws_access_key_id: ${AWS_REAL_ACCESS_KEY_ID:-}
      TF_VAR_real_aws_secret_access_key: ${AWS_REAL_SECRET_ACCESS_KEY:-}
      TF_VAR_real_aws_session_token: ${AWS_REAL_SESSION_TOKEN:-}
      TF_VAR_real_s3_bucket: ${AWS_REAL_S3_BUCKET:-not-configured}
      TF_VAR_real_s3_prefix: ${AWS_REAL_S3_PREFIX:-documents/}
      TF_VAR_textract_enabled: ${TEXTRACT_ENABLED:-false}
      TF_VAR_textract_region: ${TEXTRACT_REGION:-eu-central-1}
      TF_VAR_textract_max_pages: ${TEXTRACT_MAX_PAGES:-0}
      TF_VAR_textract_max_bytes: ${TEXTRACT_MAX_BYTES:-0}
    volumes:
      - ./infra:/workspace/infra
      - terraform-plugin-cache:/terraform/plugin-cache
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - backend

  node:
    image: node:22-bookworm-slim
    working_dir: /workspace
    profiles:
      - tools
    environment:
      CI: "true"
      npm_config_cache: /npm-cache
      PUPPETEER_SKIP_DOWNLOAD: "true"
    volumes:
      - .:/workspace
      - node-modules:/workspace/node_modules
      - npm-cache:/npm-cache
      - playwright-cache:/root/.cache/ms-playwright
    # edge: serve solo l'egress npm; nessun accesso a datastore o telemetria
    networks:
      - edge

  frontend-audit:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /workspace
    profiles:
      - tools
    environment:
      CI: "true"
      npm_config_cache: /npm-cache
      PUPPETEER_SKIP_DOWNLOAD: "true"
    volumes:
      - .:/workspace
      - node-modules:/workspace/node_modules
      - npm-cache:/npm-cache
    # edge: gli audit a11y passano da https://traefik:8443
    networks:
      - edge

  tls-tool:
    image: alpine/openssl:3.5.4
    working_dir: /workspace
    profiles:
      - tools
    # L'entrypoint dell'immagine è "openssl": si sovrascrive con sh per
    # eseguire scripts/tls/generate-local-cert.sh
    entrypoint: ["/bin/sh"]
    volumes:
      - .:/workspace
    # Genera solo cert su filesystem: nessuna rete necessaria
    network_mode: none

  postgres:
    image: postgres:16-alpine
    # Nessuna porta esposta sull'host: vi accedono solo i servizi sulla rete
    # interna. Per il debug: docker compose exec postgres psql -U poc -d poc
    environment:
      POSTGRES_DB: ${POC_DB_DATABASE:-poc}
      POSTGRES_USER: ${POC_DB_USERNAME:-poc}
      POSTGRES_PASSWORD: ${POC_DB_PASSWORD:-poc-local-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7-alpine
    # Nessuna porta esposta sull'host: vi accedono solo app e queue sulla rete
    # interna. Per il debug: docker compose exec redis redis-cli
    # volatile-lru e non allkeys-lru: sessioni, cache e contatori di throttle
    # hanno tutti TTL; evictare chiavi senza TTL azzererebbe i rate limit.
    command:
      - redis-server
      - --requirepass
      - ${POC_REDIS_PASSWORD:-poc-redis-local-password}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - volatile-lru
    environment:
      # Autentica redis-cli (healthcheck e make fresh) senza password in argv
      REDISCLI_AUTH: ${POC_REDIS_PASSWORD:-poc-redis-local-password}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  localstack:
    image: localstack/localstack:4.5
    environment:
      AWS_DEFAULT_REGION: ${POC_AWS_DEFAULT_REGION:-eu-north-1}
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      SERVICES: s3,sqs,stepfunctions,ssm,secretsmanager,events,ses,iam,sts,logs
    # Bind solo su loopback: serve a terraform/aws CLI dall'host, non alla LAN
    ports:
      - "127.0.0.1:${LOCALSTACK_PORT:-4566}:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "awslocal", "sqs", "list-queues"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - backend

# Segmentazione di rete (least privilege):
# - edge: traffico HTTP in ingresso (traefik <-> nginx) e tool di audit frontend
# - backend: app, worker, datastore e AWS locale — non raggiungibile da grafana & co.
# - observability: telemetria (otel, prometheus, tempo, loki, alloy, grafana);
#   traefik vi partecipa solo per instradare le dashboard e per lo scrape :9100
networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
  observability:
    driver: bridge

volumes:
  observability-metrics:
  loki-data:
  alloy-data:
  postgres-data:
  redis-data:
  localstack-data:
  prometheus-data:
  tempo-data:
  alertmanager-data:
  grafana-data:
  terraform-plugin-cache:
  node-modules:
  npm-cache:
  playwright-cache:
