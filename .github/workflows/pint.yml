name: Pint

on:
  push:
    branches:
      - develop
      - main
      - migration/new_techs
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pint:
    name: Check code style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build PHP runtime
        run: docker compose build app

      - name: Run Pint
        run: docker compose run --rm --no-deps app php vendor/bin/pint --test
