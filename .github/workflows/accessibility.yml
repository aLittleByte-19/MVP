name: Accessibility

on:
  push:
    branches:
      - develop
      - main
      - migration/new_techs
  pull_request:

permissions:
  contents: read

jobs:
  accessibility:
    name: Axe and Pa11y
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node dependencies
        run: docker compose --profile tools run --rm node npm ci --ignore-scripts

      - name: Generate local TLS certificate
        run: make local-tls

      - name: Start infrastructure
        run: make infra-up

      - name: Apply LocalStack infrastructure
        run: make infra-apply

      - name: Run database migrations
        run: make release

      - name: Start application
        run: docker compose up -d --build app nginx traefik

      - name: Wait for application
        run: |
          for attempt in {1..120}; do
            if curl --silent --fail --insecure https://localhost:8443/health > /dev/null; then
              exit 0
            fi

            sleep 2
          done

          docker compose logs
          exit 1

      - name: Run axe
        run: docker compose --profile tools run --rm frontend-audit node scripts/a11y/axe-playwright.mjs https://traefik:8443

      - name: Run Pa11y
        run: docker compose --profile tools run --rm frontend-audit node scripts/a11y/pa11y-runner.mjs https://traefik:8443

      - name: Stop application
        if: always()
        run: docker compose down --volumes --remove-orphans
