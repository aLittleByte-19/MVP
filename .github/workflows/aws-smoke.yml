name: AWS Smoke

# Smoke opzionale e NON bloccante contro AWS reale (S3, Textract, Bedrock).
# Si lancia solo manualmente (workflow_dispatch), quindi non partecipa ai
# check di PR/push. Due modalità di autenticazione, in ordine di preferenza:
#   1. OIDC: passare aws_role_arn (quando sarà disponibile lo IAM role della repo)
#   2. Credenziali effimere: secrets AWS_REAL_ACCESS_KEY_ID /
#      AWS_REAL_SECRET_ACCESS_KEY / AWS_REAL_SESSION_TOKEN da caricare
#      prima del run e revocare/lasciar scadere dopo.
# Bucket, regioni e model id arrivano da repository variables (vars.*) con
# default allineati a docker-compose.yml.

on:
  workflow_dispatch:
    inputs:
      aws_role_arn:
        description: IAM role ARN assumable through GitHub OIDC (preferito alle chiavi).
        required: false
        type: string
      s3_bucket:
        description: Override del bucket S3 reale (default vars.AWS_REAL_S3_BUCKET).
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  preflight:
    name: Detect credentials
    runs-on: ubuntu-latest

    outputs:
      mode: ${{ steps.detect.outputs.mode }}

    steps:
      - name: Detect credential source
        id: detect
        env:
          ROLE_ARN: ${{ inputs.aws_role_arn }}
          ACCESS_KEY_ID: ${{ secrets.AWS_REAL_ACCESS_KEY_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.AWS_REAL_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$ROLE_ARN" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "$ACCESS_KEY_ID" ] && [ -n "$SECRET_ACCESS_KEY" ]; then
            echo "mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "::notice::Nessuna credenziale AWS disponibile (ne' aws_role_arn ne' secrets AWS_REAL_*): smoke saltato."
          fi

  smoke:
    name: Real AWS smoke (S3, Textract, Bedrock)
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.mode != 'none'

    env:
      AWS_REGION: ${{ vars.AWS_REAL_REGION || 'eu-central-1' }}
      S3_BUCKET: ${{ inputs.s3_bucket || vars.AWS_REAL_S3_BUCKET }}
      S3_PREFIX: ${{ vars.AWS_REAL_S3_PREFIX || 'documents/' }}
      TEXTRACT_REGION: ${{ vars.TEXTRACT_REGION || vars.AWS_REAL_REGION || 'eu-central-1' }}
      BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID || 'amazon.nova-lite-v1:0' }}
      BEDROCK_REGION: ${{ vars.BEDROCK_REGION || 'eu-north-1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials through OIDC
        if: needs.preflight.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials from ephemeral secrets
        if: needs.preflight.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_REAL_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_REAL_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_REAL_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify caller identity
        run: aws sts get-caller-identity

      - name: S3 and Textract round-trip
        run: |
          if [ -z "$S3_BUCKET" ]; then
            echo "::warning::Bucket S3 non configurato (vars.AWS_REAL_S3_BUCKET o input s3_bucket): salto smoke S3/Textract."
            exit 0
          fi

          if ! command -v convert > /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          fi

          convert -size 600x140 xc:white -pointsize 28 -draw "text 30,80 'NEXUM CI smoke test'" smoke.png

          key="${S3_PREFIX%/}/ci-smoke/${GITHUB_RUN_ID}-smoke.png"
          trap 'aws s3api delete-object --bucket "$S3_BUCKET" --key "$key" > /dev/null || true' EXIT

          aws s3api put-object --bucket "$S3_BUCKET" --key "$key" --body smoke.png > /dev/null
          aws s3api head-object --bucket "$S3_BUCKET" --key "$key" > /dev/null
          echo "S3 put/head OK: s3://$S3_BUCKET/$key"

          lines="$(aws textract detect-document-text \
            --region "$TEXTRACT_REGION" \
            --document "{\"S3Object\":{\"Bucket\":\"$S3_BUCKET\",\"Name\":\"$key\"}}" \
            --query "Blocks[?BlockType=='LINE'].Text" \
            --output text)"

          echo "Textract OK, testo estratto: $lines"
          echo "$lines" | grep -qi "smoke test"

      - name: Bedrock converse
        run: |
          reply="$(aws bedrock-runtime converse \
            --region "$BEDROCK_REGION" \
            --model-id "$BEDROCK_MODEL_ID" \
            --messages '[{"role":"user","content":[{"text":"Rispondi con una sola parola: ok"}]}]' \
            --inference-config '{"maxTokens":16}' \
            --query 'output.message.content[0].text' \
            --output text)"

          echo "Bedrock OK ($BEDROCK_MODEL_ID): $reply"
          test -n "$reply"
