name: LocalStack Smoke

on:
  push:
    branches:
      - develop
      - main
      - migration/new_techs
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Compose, Terraform and HTTPS smoke
    runs-on: ubuntu-latest

    env:
      # secrets non è disponibile in steps[*].if: va mappato su env
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull images with retry
        env:
          COMPOSE_PARALLEL_LIMIT: "2"
        run: |
          for attempt in {1..5}; do
            if docker compose --profile tools pull --ignore-buildable --quiet tls-tool terraform postgres redis localstack traefik otel-collector prometheus tempo alertmanager grafana loki alloy; then
              exit 0
            fi

            echo "::warning::Image pull failed (attempt ${attempt}/5), retrying in $((attempt * 20))s"
            sleep $((attempt * 20))
          done

          exit 1

      - name: Generate local TLS certificate
        run: make local-tls

      - name: Build images
        run: docker compose build

      - name: Validate observability config
        run: make observability-config

      - name: Start dependencies
        run: docker compose up -d postgres redis localstack

      - name: Apply LocalStack infrastructure
        run: docker compose --profile tools run --rm terraform init && docker compose --profile tools run --rm terraform apply -auto-approve

      - name: Run migrations
        run: docker compose --profile release run --rm migrate

      - name: Start runtime
        run: docker compose up -d app queue nginx traefik otel-collector prometheus tempo alertmanager grafana

      - name: Smoke HTTPS endpoints
        run: |
          for _ in {1..120}; do
            if curl --silent --fail --insecure https://localhost:8443/health > /dev/null; then
              break
            fi

            sleep 2
          done

          curl --silent --fail --insecure https://localhost:8443/health
          curl --silent --fail --insecure https://localhost:8443/ready
          curl --silent --fail --insecure https://localhost:8443/api/v1/state
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' --insecure https://localhost:8443/internal/metrics)" = "404"
          curl --silent --fail http://localhost:9090/-/ready
          curl --silent --fail http://localhost:9093/-/ready
          curl --silent --fail http://localhost:3000/api/health

      - name: Stop application
        if: always()
        run: docker compose down --volumes --remove-orphans
