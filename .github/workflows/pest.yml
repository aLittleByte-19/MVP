name: Pest

on:
  push:
    branches:
      - develop
      - main
      - migration/new_techs
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pest:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build PHP runtime
        run: docker compose build app

      - name: Run Pest
        run: >
          docker compose run --rm --no-deps
          -e CONFIG_SOURCE=env
          -e APP_ENV=testing
          -e CACHE_STORE=array
          -e SESSION_DRIVER=array
          -e QUEUE_CONNECTION=sync
          -e DB_CONNECTION=sqlite
          -e DB_DATABASE=:memory:
          -e DB_HOST=
          -e DB_PORT=
          -e DB_USERNAME=
          -e DB_PASSWORD=
          app php artisan test --display-warnings
