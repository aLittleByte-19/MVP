<div class="star-container">
  @for (star of [1, 2, 3, 4, 5]; track star) {
    <button 
      type="button" 
      [disabled]="disabled"
      (click)="rate(star)"
      (mouseenter)="!disabled && (hoverState = star)"
      (mouseleave)="!disabled && (hoverState = 0)"
      class="star-button"
      [class.active]="star <= (hoverState || rating)"
      [class.disabled]="disabled">
      ★
    </button>
  }
</div>
