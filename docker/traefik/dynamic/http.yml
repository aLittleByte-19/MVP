http:
  routers:
    poc-nginx-web:
      rule: Host(`localhost`) || Host(`poc.localhost`) || Host(`traefik`)
      entryPoints:
        - web
      middlewares:
        - poc-redirect-https
      service: poc-nginx
    poc-nginx-websecure:
      rule: Host(`localhost`) || Host(`poc.localhost`) || Host(`traefik`)
      entryPoints:
        - websecure
      service: poc-nginx
      tls: {}

  middlewares:
    poc-redirect-https:
      redirectScheme:
        scheme: https
        port: "8443"

  services:
    poc-nginx:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: http://nginx:8080
