global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service_namespace: alittlebyte
    environment: local

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Flusso metriche: app (/internal/metrics via listener interno nginx:8081)
# e traefik vengono raschiati
# dall'OTel Collector (docker/otel-collector/config.yml), che li re-espone sul
# proprio exporter Prometheus :9464. Prometheus scrappa quindi solo il collector:
# un unico punto di raccolta sia per le metriche scrape sia per quelle OTLP push.
scrape_configs:
  - job_name: mvp-otel-collector-exporter
    static_configs:
      - targets:
          - otel-collector:9464

  - job_name: mvp-prometheus
    static_configs:
      - targets:
          - prometheus:9090
