groups:
  - name: mvp-queue-alerts
    rules:
      - alert: QueueBacklogHigh
        expr: increase(mvp_sqs_messages_received_total[30m]) == 0 and mvp_original_documents_total{status="processing"} > 0
        for: 15m
        labels:
          severity: warning
          service_namespace: alittlebyte
        annotations:
          summary: "Workflow queue may be stalled"
          description: "Documents are processing but no SQS messages were consumed recently."
          runbook: "https://github.com/aLittleByte-19/MVP/blob/main/docs/runbooks/document-pipeline.md"

      - alert: DLQNotEmpty
        expr: mvp_dlq_messages_total > 0
        for: 1m
        labels:
          severity: critical
          service_namespace: alittlebyte
        annotations:
          summary: "Document workflow DLQ contains messages"
          description: "Run php artisan mvp:dlq:list to inspect failed messages."
          runbook: "https://github.com/aLittleByte-19/MVP/blob/main/docs/runbooks/dlq-recovery.md"
