groups:
  - name: mvp-api-alerts
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
          service_namespace: alittlebyte
        annotations:
          summary: "Prometheus target down"
          description: "{{ $labels.job }} / {{ $labels.instance }} is down."
          runbook: "https://github.com/aLittleByte-19/MVP/blob/main/docs/runbooks/observability.md"

      - alert: APIHighErrorRate
        expr: |
          (
            sum(rate(mvp_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(mvp_http_requests_total[5m])), 1)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
          service_namespace: alittlebyte
        annotations:
          summary: "High API 5xx error ratio"
          description: "The HTTP 5xx ratio has been above 5% for 10 minutes."
          runbook: "https://github.com/aLittleByte-19/MVP/blob/main/docs/runbooks/observability.md"

      - alert: APIHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(mvp_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 10m
        labels:
          severity: warning
          service_namespace: alittlebyte
        annotations:
          summary: "High API p95 latency"
          description: "The HTTP p95 latency has been above 1 second for 10 minutes."
          runbook: "https://github.com/aLittleByte-19/MVP/blob/main/docs/runbooks/observability.md"
