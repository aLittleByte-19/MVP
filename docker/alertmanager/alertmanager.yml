global:
  resolve_timeout: 5m

route:
  receiver: poc-local-demo
  group_by:
    - alertname
    - service_namespace
  group_wait: 15s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  # Local demo receiver. External push notifiers (email/SES, Slack) are out of the
  # PoC scope, so fired alerts are inspected via the Alertmanager UI (:9093) rather
  # than delivered. Wire a real integration by uncommenting and configuring below.
  - name: poc-local-demo
    # webhook_configs:
    #   - url: http://alert-sink:9000/webhook
    #     send_resolved: true
