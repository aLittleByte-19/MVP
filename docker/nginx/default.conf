# La preview PDF e' incorporata dalla SPA in un <iframe> same-origin: solo per
# quella risposta frame-ancestors deve essere 'self'. Si usa una map perche' il
# blocco "location ^~ /api/" sopprime il match delle location regex (semantica
# ^~), quindi una location regex dedicata alla preview non verrebbe mai usata.
# La chiave e' $request_uri (mai riscritto): $uri al momento dell'emissione
# degli header e' gia' diventato /index.php per effetto di try_files.
map $request_uri $poc_csp {
    ~^/api/v1/documents/[0-9]+/preview(?:\?|$) "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self'; frame-src 'self' blob:";
    default "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self'; frame-src 'self' blob:";
}

server {
    listen 8080;
    server_name _;

    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $poc_csp always;

    root /var/www/html/public;
    index index.html index.php;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=30s ipv6=off;

    location = /health {
        try_files /index.php =404;
        set $poc_php_fpm app:9000;
        fastcgi_pass $poc_php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location = /ready {
        try_files /index.php =404;
        set $poc_php_fpm app:9000;
        fastcgi_pass $poc_php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location = /internal/metrics {
        return 404;
    }

    location ^~ /api/ {
        try_files /index.php =404;
        set $poc_php_fpm app:9000;
        fastcgi_pass $poc_php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location = /admin {
        return 404;
    }

    location ^~ /admin/ {
        return 404;
    }

    location = /poc/api {
        return 404;
    }

    location ^~ /poc/api/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ \.php$ {
        set $php_fpm app:9000;
        fastcgi_pass $php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

server {
    listen 8081;
    server_name _;

    server_tokens off;

    root /var/www/html/public;
    index index.php;
    resolver 127.0.0.11 valid=30s ipv6=off;

    location = /internal/metrics {
        try_files /index.php =404;
        set $poc_php_fpm app:9000;
        fastcgi_pass $poc_php_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location / {
        return 404;
    }
}
